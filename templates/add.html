{% extends 'base.html' %}

{% block content %}

<h4 class="mb-4">Add New Application</h4>

<div class="card shadow-sm p-4">
    <form method="POST">
        <div class="mb-3">
            <label class="form-label">Company Name</label>
            <input type="text" name="company" class="form-control" placeholder="e.g. Centene Corporation" required>
        </div>
        <div class="mb-3">
            <label class="form-label">Job Role</label>
            <input type="text" name="role" class="form-control" placeholder="e.g. Healthcare Data Analyst" required>
        </div>
        <div class="mb-3">
            <label class="form-label">Date Applied</label>
            <input type="date" name="date_applied" class="form-control" required>
        </div>
        <div class="mb-3">
            <label class="form-label">Status</label>
            <select name="status" class="form-select">
                <option value="Applied">Applied</option>
                <option value="Interview">Interview</option>
                <option value="Rejected">Rejected</option>
                <option value="Offer">Offer</option>
                <option value="Ghosted">Ghosted</option>
            </select>
        </div>
        <div class="mb-3">
            <label class="form-label">Notes</label>
            <textarea name="notes" class="form-control" rows="3" placeholder="Recruiter name, portal link, anything useful..."></textarea>
        </div>
        <button type="submit" class="btn btn-success w-100">Save Application</button>
        <a href="/" class="btn btn-outline-secondary w-100 mt-2">Cancel</a>
    </form>
</div>

{% endblock %}
